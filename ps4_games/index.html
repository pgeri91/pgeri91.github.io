---
layout: base
title: PS4 games
---

<style type="text/css">
  body {
    background-image: url("background.jpg");
    background-size: cover;
    background-position: 50%;
  }
</style>
<div class="card text-white bg-dark mb-3">
  <div class="card-body">
      <h1 class="card-title">PS4 játékok</h1>
      <h5 class="card-subtitle">A zöldek megvannak/voltak!</h5>
  </div>
</div>
<div class="row">
    {% for post in site.categories.ps4_games %}
    <div class="col-sm-6 col-lg-4">
      <div class="card-flip">
        <div class="flip">
          <div class="front">
            {% if post.owned == true %}
            <div class="card bg-success text-white" style="width: 18rem;">
            {% else %}
            <div class="card bg-primary text-white" style="width: 18rem;">
            {% endif %}
              <img class="card-img-top" src="{{post.image}}" alt="Card image cap">
              <div class="card-body">
                <h5 class="card-title">{{post.title}}</h5>
              </div>
            </div>
          </div>
          <div class="back">
            {% if post.owned == true %}
            <div class="card bg-success text-white mb-3 mr-3" style="width: 18rem;">
            {% else %}
            <div class="card bg-primary text-white mb-3 mr-3" style="width: 18rem;">
            {% endif %}
              <img class="card-img-top" src="{{post.imageb}}" alt="Card image cap">
              <div class="card-body">
                <a href="{{post.web}}" class="card-link">Website</a>
              </div>
            </div>
          </div>  
        </div>     
      </div>
    </div>
    {% endfor %}
</div>

<script>
  document.querySelector(".card-flip").classList.toggle("flip");
</script>
